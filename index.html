<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어디서 만날까? – 전국 여행지 추천</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== 헤더 ===== -->
  <header class="hero">
    <div class="hero-inner">
      <h1>어디서 만날까?</h1>
      <p class="hero-sub">각자 출발지와 인원수만 넣으면,<br>모두가 편한 전국 여행지를 찾아드려요.</p>
    </div>
  </header>

  <!-- ===== 입력 폼 영역 ===== -->
  <main class="container">
    <section class="input-section" id="inputSection">

      <!-- 출발지 입력 -->
      <div class="card input-card">
        <h2 class="section-title">🚗 출발지 & 인원</h2>
        <div id="originList"></div>
        <button type="button" class="btn btn-add" id="addOriginBtn">+ 출발지 추가</button>
      </div>

      <!-- 여행 성향 선택 -->
      <div class="card input-card">
        <h2 class="section-title">🎯 여행 성향</h2>
        <p class="helper-text">원하는 여행 스타일을 모두 선택하세요 (복수 선택 가능)</p>
        <div class="chip-group" id="travelStyleGroup">
          <label class="chip"><input type="checkbox" value="숙소에서놀기"> 🏠 숙소에서 놀기</label>
          <label class="chip"><input type="checkbox" value="액티비티"> 🏄 액티비티</label>
          <label class="chip"><input type="checkbox" value="먹방"> 🍽️ 먹방</label>
          <label class="chip"><input type="checkbox" value="자연계곡"> 🌿 자연/계곡</label>
          <label class="chip"><input type="checkbox" value="도시술자리"> 🍻 도시형 술자리</label>
        </div>
      </div>

      <!-- 필수 숙소 조건 -->
      <div class="card input-card">
        <h2 class="section-title">🏨 필수 숙소 조건</h2>
        <p class="helper-text">반드시 있어야 하는 시설을 체크하세요</p>
        <div class="chip-group" id="facilityGroup">
          <label class="chip"><input type="checkbox" value="수영장"> 🏊 수영장</label>
          <label class="chip"><input type="checkbox" value="족구장"> ⚽ 족구장</label>
          <label class="chip"><input type="checkbox" value="노래방"> 🎤 노래방</label>
          <label class="chip"><input type="checkbox" value="바비큐"> 🔥 바비큐</label>
          <label class="chip"><input type="checkbox" value="독채"> 🏡 독채</label>
        </div>
        <div class="filter-mode-row">
          <label class="toggle-label">
            <input type="checkbox" id="strictFilter" checked>
            <span>조건 미충족 시 제외 (해제하면 감점만)</span>
          </label>
        </div>
      </div>

      <!-- 추천 개수 -->
      <div class="card input-card inline-row">
        <label class="rec-count-label" for="recCount">추천 개수</label>
        <select id="recCount">
          <option value="3">3개</option>
          <option value="5" selected>5개</option>
          <option value="10">10개</option>
          <option value="15">15개</option>
          <option value="20">20개</option>
        </select>
      </div>

      <!-- 추천 버튼 -->
      <button type="button" class="btn btn-primary" id="searchBtn">여행지 추천받기 ✈️</button>
    </section>

    <!-- ===== 결과 영역 ===== -->
    <section class="result-section hidden" id="resultSection">
      <div class="result-header">
        <h2 class="section-title">📍 추천 결과</h2>
        <button type="button" class="btn btn-copy" id="copyBtn">📋 결과 복사</button>
      </div>
      <div id="resultList"></div>
    </section>

    <!-- 복사 완료 토스트 -->
    <div class="toast hidden" id="toast">클립보드에 복사되었습니다!</div>
  </main>

  <!-- ===== 푸터 ===== -->
  <footer class="footer">
    <p>오프라인 작동 · 서버 없음 · 데이터 수집 없음</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
